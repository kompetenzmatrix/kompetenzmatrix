<!-- Immer sichtbare Aktionen: CMS bearbeiten + Repo -->
{{- $editURL := "/admin/" -}}
{{- if and .Params.modul .Params.cluster -}}
  {{- $editURL = printf "/admin/#/collections/%s/entries/%s/_index" .Params.cluster .Params.modul -}}
{{- end -}}
<div class="fab-group">
  <a class="edit-fab" href="{{ $editURL }}" title="Diese Seite im CMS bearbeiten">
    <i class="fas fa-pen"></i><span>Änderung vorschlagen</span>
  </a>
  <a class="repo-fab" href="https://github.com/kompetenzmatrix/kompetenzmatrix" target="_blank" rel="noopener" title="Quellcode auf GitHub">
    <i class="fab fa-github"></i><span>GitHub</span>
  </a>
</div>

<!-- Collapsible Sidebar-Menü -->
<script>
(function () {
  function toggle(el) {
    var item = el.closest('.dd-item');
    if (item) item.classList.toggle('open');
  }
  document.addEventListener('click', function (e) {
    var t = e.target.closest('.dd-toggle');
    if (!t) return;
    e.preventDefault();
    e.stopPropagation();
    toggle(t);
  });
  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    var t = e.target.closest && e.target.closest('.dd-toggle');
    if (!t) return;
    e.preventDefault();
    toggle(t);
  });
})();
</script>
