backend:
  name: github
  repo: kompetenzmatrix/kompetenzmatrix
  branch: main
  # Self-hosted OAuth relay on it.bzz.ch (PHP). No Cloudflare/Netlify account needed.
  base_url: https://kompetenzmatrix.ch
  auth_endpoint: cms-oauth/auth
  # Open authoring: any GitHub user logs in, the CMS forks the repo for them and
  # opens a Pull Request from their fork. No collaborator access / account management.
  # NOTE: open_authoring and auth_scope MUST live under backend: — Decap reads
  # config.backend.open_authoring; at top level they are silently ignored.
  open_authoring: true
  auth_scope: public_repo

publish_mode: editorial_workflow

locale: de
media_folder: static/images
public_folder: /images

collections:
  - name: cluster-api
    label: "Informatik – Applikationsentwicklung"
    label_singular: "Modul: Informatik – Applikationsentwicklung"
    folder: content/informatiker/cluster-api
    extension: md
    format: yaml-frontmatter
    create: true
    filter: { field: cms, value: true }
    summary: "{{fields.title}} · {{dirname}}"
    identifier_field: title
    # Baum-Ansicht: Modul (m183/_index.md = Matrix) als Knoten; die
    # Begleitseiten liegen als handlungssituationen/_index.md und
    # umsetzungsvorschlag/_index.md und erscheinen eingerückt darunter.
    # Modul-Klick listet die beiden Unterseiten; die Matrix ist der
    # Modul-Eintrag selbst (auf Cluster-Ebene wählbar).
    nested: &nestcfg
      depth: 3
      summary: "{{fields.title}}"
    meta: &metacfg
      path:
        widget: string
        label: "Pfad (Ordner)"
        index_file: _index
    fields: &modulfelder
      - { label: "CMS-Marker", name: cms, widget: hidden, default: true }
      - { label: "Titel", name: title, widget: hidden }
      - { label: "Modul (Ordnername, z.B. m183)", name: modul, widget: hidden }
      - { label: "Cluster", name: cluster, widget: hidden }
      - { label: "Datum", name: date, widget: hidden, required: false }
      # Passthrough: keep frontmatter Decap would otherwise strip on save
      # (aliases = old URLs, weight = ordering of umsetzung/handlung, draft).
      - { label: "Aliases", name: aliases, widget: hidden, required: false }
      - { label: "Reihenfolge", name: weight, widget: hidden, required: false }
      - { label: "Entwurf", name: draft, widget: hidden, required: false }
      - { label: "ID-Reihenfolge", name: idorder, widget: hidden, required: false }
      - { label: "ÜK-Modul (keine Matrix)", name: uek, widget: hidden, default: false, required: false }
      - label: "Kompetenzbänder"
        name: kompetenzbaender
        widget: list
        required: false
        summary: "{{fields.id}} – {{fields.titel}}"
        fields:
          - { label: "Band-ID (A, B, C …)", name: id, widget: string, pattern: ['^[A-Z]+$', 'Grossbuchstabe(n)'] }
          - { label: "Bandtitel", name: titel, widget: string }
          - label: "Kompetenzen"
            name: kompetenzen
            widget: list
            summary: "Nr {{fields.nr}} (HZ {{fields.hz}})"
            fields:
              - { label: "Nr", name: nr, widget: number, value_type: int, min: 1 }
              - { label: "Handlungsziele (HZ)", name: hz, widget: string, required: false, hint: "z.B. 1, 2" }
              - { label: "Grundlagen", name: grundlagen, widget: text, pattern: ['^Ich kann', 'Muss mit „Ich kann" beginnen'] }
              - { label: "Fortgeschritten", name: fortgeschritten, widget: text, pattern: ['^Ich kann', 'Muss mit „Ich kann" beginnen'] }
              - { label: "Erweitert", name: erweitert, widget: text, pattern: ['^Ich kann', 'Muss mit „Ich kann" beginnen'] }
      - { label: "Weiterer Inhalt (Bloom-Analyse, Änderungsprotokoll)", name: body, widget: markdown, required: false }

  - name: cluster-cloud
    label: "Informatik – Cloud Computing"
    label_singular: "Modul: Informatik – Cloud Computing"
    folder: content/informatiker/cluster-cloud
    extension: md
    format: yaml-frontmatter
    create: true
