name: Deploy to it.bzz.ch

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid overlapping deploys
concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.3"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy via rsync over SSH
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}        # e.g. /var/www/kompetenzmatrix/
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H it.bzz.ch >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new" \
            public/ root@it.bzz.ch:"$DEPLOY_PATH"
